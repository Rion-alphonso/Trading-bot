<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {{ font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f5f7; margin: 0; padding: 20px; }}
        .container {{ max-width: 600px; margin: 0 auto; background-color: #1a1e23; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }}
        .header {{ background-color: #242930; padding: 25px; text-align: center; border-bottom: 1px solid #333942; }}
        .header h1 {{ margin: 0; color: #ffffff; font-size: 24px; font-weight: 600; letter-spacing: 1px; }}
        .badge {{ display: inline-block; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-top: 15px; color: #fff; background-color: #8b5cf6; }}
        .content {{ padding: 30px; color: #d1d5db; }}
        .grid {{ display: table; width: 100%; border-collapse: separate; border-spacing: 0 15px; }}
        .row {{ display: table-row; }}
        .col-left {{ display: table-cell; font-size: 14px; color: #9ca3af; width: 50%; padding-bottom: 5px; }}
        .col-right {{ display: table-cell; font-size: 16px; color: #ffffff; font-weight: 600; text-align: right; width: 50%; }}
        .divider {{ height: 1px; background-color: #333942; margin: 20px 0; }}
        .footer {{ background-color: #111316; padding: 15px; text-align: center; font-size: 12px; color: #6b7280; }}
        .accent {{ color: #3b82f6; }}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>TRADING <span class="accent">OS</span></h1>
            <div class="badge">HOURLY SNAPSHOT</div>
        </div>
        <div class="content">
            <p style="text-align: center; color: #9ca3af; margin-top: 0; margin-bottom: 25px; font-size: 15px;">
                Here is your hourly performance check-in for the active session.
            </p>
            <div class="grid">
                <div class="row">
                    <div class="col-left">Open Positions</div>
                    <div class="col-right">{open_positions}</div>
                </div>
                <div class="row">
                    <div class="col-left">Floating PnL</div>
                    <div class="col-right" style="color: {pnl_color};">{floating_pnl}</div>
                </div>
                <div class="row">
                    <div class="col-left">System State</div>
                    <div class="col-right">{state}</div>
                </div>
            </div>
            
            <div class="divider"></div>
            
            <div class="grid">
                <div class="row">
                    <div class="col-left">Current Balance</div>
                    <div class="col-right">${balance}</div>
                </div>
                <div class="row">
                    <div class="col-left">Current Equity</div>
                    <div class="col-right">${equity}</div>
                </div>
            </div>
            
        </div>
        <div class="footer">
            Automated execution via Trading OS • Hourly System Report
        </div>
    </div>
</body>
</html>
