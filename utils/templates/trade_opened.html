<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f5f7; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background-color: #1a1e23; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { background-color: #242930; padding: 25px; text-align: center; border-bottom: 1px solid #333942; }
        .header h1 { margin: 0; color: #ffffff; font-size: 24px; font-weight: 600; letter-spacing: 1px; }
        .badge { display: inline-block; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-top: 15px; color: #fff; background-color: {color}; }
        .content { padding: 30px; color: #d1d5db; }
        .grid { display: table; width: 100%; border-collapse: separate; border-spacing: 0 15px; }
        .row { display: table-row; }
        .col-left { display: table-cell; font-size: 14px; color: #9ca3af; width: 50%; padding-bottom: 5px; }
        .col-right { display: table-cell; font-size: 16px; color: #ffffff; font-weight: 600; text-align: right; width: 50%; }
        .divider { height: 1px; background-color: #333942; margin: 20px 0; }
        .footer { background-color: #111316; padding: 15px; text-align: center; font-size: 12px; color: #6b7280; }
        .accent { color: #3b82f6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>TRADING <span class="accent">OS</span></h1>
            <div class="badge">{action} EXECUTED</div>
        </div>
        <div class="content">
            <div class="grid">
                <div class="row">
                    <div class="col-left">Ticket Number</div>
                    <div class="col-right">#{ticket}</div>
                </div>
                <div class="row">
                    <div class="col-left">Martingale Level</div>
                    <div class="col-right">{level}</div>
                </div>
                <div class="row">
                    <div class="col-left">Lot Size</div>
                    <div class="col-right">{size}</div>
                </div>
                <div class="row">
                    <div class="col-left">Entry Price</div>
                    <div class="col-right">{entry_price}</div>
                </div>
            </div>
            
            <div class="divider"></div>
            
            <div class="grid">
                <div class="row">
                    <div class="col-left">Target Profit (TP)</div>
                    <div class="col-right" style="color: #10b981;">{tp}</div>
                </div>
                <div class="row">
                    <div class="col-left">Stop Loss (SL)</div>
                    <div class="col-right" style="color: #ef4444;">{sl}</div>
                </div>
            </div>
            
            <div class="divider"></div>
            
            <div class="grid">
                <div class="row">
                    <div class="col-left">Account Balance</div>
                    <div class="col-right">${balance}</div>
                </div>
                <div class="row">
                    <div class="col-left">Account Equity</div>
                    <div class="col-right">${equity}</div>
                </div>
            </div>
        </div>
        <div class="footer">
            Automated execution via Trading OS • MetaTrader 5
        </div>
    </div>
</body>
</html>
